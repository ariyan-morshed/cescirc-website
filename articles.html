<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore IR - CESCIRC</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Redaction+20&family=Redaction+35&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        :root {
            --bg-primary: #5A1F1F;         
            --bg-secondary: #6B2828;       
            --text-primary: #F4EFDD;       
            --text-secondary: #D4C6AC;     
            --accent-primary: #C9A34E;     
            --accent-hover: #E5C46B;       
            --border-color: rgba(138, 106, 46, 0.35); 
            --bg-shadow: #2a0e0e;          
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            background-image: 
                radial-gradient(circle at 85% 15%, rgba(201, 163, 78, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 10% 90%, rgba(30, 10, 10, 0.6) 0%, transparent 50%),
                linear-gradient(rgba(201, 163, 78, 0.09) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201, 163, 78, 0.09) 1px, transparent 1px),
                linear-gradient(160deg, #5A1F1F 0%, #4a1818 50%, #5A1F1F 100%);
            background-size: 100% 100%, 100% 100%, 50px 50px, 50px 50px, 100% 100%;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .explore-container {
            padding-top: 120px; 
            text-align: center;
            min-height: 100vh;
            padding-bottom: 80px;
            position: relative;
            z-index: 2;
        }
        
        .random-btn {
            background-color: var(--accent-primary);
            color: var(--bg-shadow);
            font-family: 'MyRedaction', monospace; /* YOUR FONT */
            font-size: 1.5rem;
            padding: 15px 40px;
            border: 2px solid var(--accent-hover);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            margin-bottom: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .random-btn:hover {
            background-color: var(--accent-hover);
            transform: scale(1.05);
        }

        .intel-card {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(90, 31, 31, 0.6); 
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            padding: 50px 40px;
            text-align: left;
            position: relative;
            animation: fadeIn 0.5s ease-in-out;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* YOUR FONT ON ARTICLES */
        .intel-title { 
            font-family: 'MyRedaction', monospace; 
            text-transform: uppercase;
            font-size: 2.2rem; 
            color: var(--text-primary); 
            line-height: 1.3; 
            margin-bottom: 15px; 
        }
        
        .intel-source { color: var(--accent-primary); text-transform: uppercase; letter-spacing: 2px; font-size: 1rem; margin-bottom: 25px; display: block; }
        .intel-summary { color: var(--text-secondary); font-size: 1.1rem; line-height: 1.8; margin-bottom: 30px; }

        .read-btn {
            display: inline-block;
            background: transparent;
            color: var(--accent-primary);
            padding: 15px 30px;
            border: 2px solid var(--accent-primary);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .read-btn:hover {
            background: var(--accent-primary);
            color: var(--bg-shadow);
        }

        .classified-stamp {
            position: absolute;
            top: 20px;
            right: 20px;
            border: 2px solid var(--accent-primary); 
            color: var(--accent-primary);
            padding: 5px 15px;
            font-family: 'MyRedaction', monospace;
            font-size: 0.8rem;
            transform: rotate(5deg);
            opacity: 0.7;
        }

        /* V2 TOP BAR */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 40px; 
            background: rgba(42, 14, 14, 0.9); 
            backdrop-filter: blur(12px);
            position: fixed; width: 100%; top: 0; z-index: 1000; 
            border-bottom: 2px solid var(--accent-primary);
            box-sizing: border-box; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .logo-wrapper { filter: drop-shadow(0 0 6px rgba(201, 163, 78, 0.6)); z-index: 1001;}
        .logo-img { height: 65px; display: block; border-radius: 50%; }
        .nav-links { list-style: none; display: flex; gap: 25px; margin: 0; padding: 0; }
        .nav-links a { color: var(--text-primary) !important; text-decoration: none !important; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; font-weight: 600; }
        .nav-links a:hover { color: var(--accent-hover) !important; }

        @media (max-width: 768px) {
            .explore-container { padding-top: 200px !important; }
            .intel-card { padding: 30px 20px; }
            .intel-title { font-size: 1.6rem; }
            .navbar { flex-direction: column; gap: 15px; padding: 15px; align-items: center !important; text-align: center; }
            .nav-links { flex-wrap: wrap; justify-content: center; gap: 15px; }
        }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <nav class="navbar">
        <div class="logo-wrapper">
            <a href="index-v2.html"><img src="https://i.imgur.com/BxrGxQH.png" alt="CESCIRC Logo" class="logo-img"></a>
        </div>
        <ul class="nav-links">
            <li><a href="index-v2.html">Home</a></li>
            <li><a href="index-v2.html#about">About</a></li>
            <li><a href="index-v2.html#roadmap">Sessions</a></li>
            <li><a href="index-v2.html#panel">The Panel</a></li>
            <li><a href="articles.html" style="color: var(--accent-hover) !important;">Explore IR</a></li>
        </ul>
    </nav>

    <div class="explore-container">
        <!-- MYREDACTION FONT APPLIED HERE -->
        <h2 style="font-family: 'MyRedaction', monospace; color: var(--accent-hover); border: none; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; font-size: 3rem;">The Reading Room</h2>
        <p style="color: var(--text-secondary); margin-bottom: 40px; max-width: 600px; margin-left: auto; margin-right: auto; font-size: 0.9rem;">Curated intelligence. Roll the dice to discover a specific, deep-dive geopolitical briefing.</p>

        <button class="random-btn" onclick="loadRandomArticle()">Declassify Intel</button>
        <div id="card-container"></div>
    </div>

    <script>
        const articles = [
            {
                title: "Balanced foreign policy essential in changing world",
                source: "Prothom Alo",
                summary: "A Dhaka roundtable arguing that Bangladesh needs a pragmatic, strategic, and balanced foreign policy amid intensifying major-power competition and economic pressure.",
                url: "https://en.prothomalo.com/bangladesh/roundtable/d2gxuns9uz"
            },
            {
                title: "Bengal Council policy brief outlines roadmap for implementing Bangladesh-US trade deal",
                source: "The Business Standard",
                summary: "A policy brief on how Bangladesh’s reciprocal trade agreement with the United States could affect garments, geopolitics, compliance, and relations with the EU, India, and China.",
                url: "https://www.tbsnews.net/foreign-policy/bengal-council-policy-brief-outlines-roadmap-implementing-bangladesh-us-trade-deal?amp"
            },
            {
                title: "India visa restart signals warmer ties, but Chinese investment could reshape Bangladesh ties",
                source: "bdnews24",
                summary: "An analysis of how Bangladesh must balance improved ties with India against the strategic implications of deeper Chinese investment.",
                url: "https://bdnews24.com/business/3e88ea89c5da"
            },
            {
                title: "Bangladesh in the Indo-Pacific: An Analysis of the Interim Government’s Foreign Policy",
                source: "Observer Research Foundation",
                summary: "An analysis of Bangladesh’s foreign policy under the interim government, including ties with India, China, the US, and Japan in the Indo-Pacific.",
                url: "https://www.orfonline.org/research/bangladesh-in-the-indo-pacific-an-analysis-of-the-interim-government-s-foreign-policy"
            },
            {
                title: "Strong relations with China will sharpen Bangladesh's negotiation skills",
                source: "Prothom Alo",
                summary: "An interview-based opinion piece discussing why deeper ties with China may affect Bangladesh’s bargaining position with other partners.",
                url: "https://en.prothomalo.com/opinion/interview/m8wc1s36kv"
            },
            {
                title: "Bangladesh courts China even as ties with India improve",
                source: "BBC News",
                summary: "A report on Bangladesh’s efforts to seek more Chinese investment while managing a gradual warming in relations with India.",
                url: "https://www.bbc.com/news/articles/cy4e1lzwgvxo"
            },
            {
                title: "What the Russia-Ukraine war means for Bangladesh's economy",
                source: "The Daily Star",
                summary: "An economic analysis of how the Russia-Ukraine war affects Bangladesh through import costs, exports, and global price shocks.",
                url: "https://www.thedailystar.net/opinion/macro-mirror/news/what-the-ukraine-war-means-our-economy-2986941"
            },
            {
                title: "What the Russia-Ukraine war means for Bangladesh's economy",
                source: "CPD",
                summary: "A policy piece explaining how the war may widen Bangladesh’s trade deficit and raise pressure on the currency and imports.",
                url: "https://cpd.org.bd/what-the-russia-ukraine-war-means-for-bangladeshs-economy/"
            },
            {
                title: "Lingering Red Sea crisis pushes up trade costs for Bangladesh",
                source: "The Daily Star",
                summary: "A report showing how Red Sea disruptions are raising Bangladesh’s trade costs, threatening exports and adding inflation pressure.",
                url: "https://www.thedailystar.net/business/economy/news/lingering-red-sea-crisis-pushes-trade-costs-bangladesh-3520936"
            },
            {
                title: "Red Sea crisis: Domino effect on Bangladesh and global supply chain",
                source: "South Asia Monitor",
                summary: "An explainer on how the Red Sea crisis can disrupt Bangladesh’s exports, shipping routes, and broader supply chains.",
                url: "https://www.southasiamonitor.org/spotlight/red-sea-crisis-domino-effect-bangladesh-and-global-supply-chain"
            },
            {
                title: "Bangladesh is helping to create a geopolitical shift in South Asia",
                source: "Chatham House",
                summary: "An analysis of Bangladesh’s realignment under the interim government, including closer engagement with China, Pakistan, and Turkey.",
                url: "https://www.chathamhouse.org/2025/06/bangladesh-helping-create-geopolitical-shift-south-asia"
            },
            {
                title: "Bangladesh's Geopolitical Moment: Between India, China, and the United States",
                source: "Yip Institute",
                summary: "A discussion of Bangladesh as a strategic state in the Bay of Bengal and a site of competition among India, China, and the United States.",
                url: "https://yipinstitute.org/article/bangladeshs-geopolitical-moment-between-india-china-and-the-united-states"
            },
            {
                title: "The Rohingya Crisis",
                source: "Council on Foreign Relations",
                summary: "A backgrounder on the Rohingya crisis and why Bangladesh remains central because it hosts the world’s largest Rohingya refugee population.",
                url: "https://www.cfr.org/backgrounders/rohingya-crisis"
            },
            {
                title: "The Rohingya Crisis and its Impact on Bangladesh-Myanmar Relations",
                source: "Observer Research Foundation",
                summary: "A brief on how the Rohingya issue affects trade, diplomacy, and security between Bangladesh and Myanmar.",
                url: "https://www.orfonline.org/research/the-rohingya-crisis-and-its-impact-on-bangladesh-myanmar-relations"
            },
            {
                title: "Climate Change and Migration Across the Bay of Bengal",
                source: "Climate-Diplomacy.org",
                summary: "A policy analysis of how climate change may increase migration and instability across the Bay of Bengal, affecting Bangladesh directly.",
                url: "https://climate-diplomacy.org/magazine/environment/climate-change-and-migration-across-bay-bengal"
            },
            {
                title: "Climate Migrants Face a Gap in International Law",
                source: "ReliefWeb",
                summary: "A report noting that climate pressure in Bangladesh is fueling internal displacement and urbanization challenges.",
                url: "https://reliefweb.int/report/bangladesh/climate-migrants-face-gap-international-law"
            },
            {
                title: "Climate Change in Bangladesh Shapes Internal Migration",
                source: "Migration Policy Institute",
                summary: "A policy article on how climate change drives internal migration in Bangladesh and affects broader mobility debates.",
                url: "https://www.migrationpolicy.org/article/bangladesh-india-climate-migration"
            },
            {
                title: "Bangladesh’s Climate Diplomacy",
                source: "ICCCAD",
                summary: "A discussion of Bangladesh’s climate diplomacy and its leadership role in climate-vulnerable forums and negotiation spaces.",
                url: "https://icccad.net/dr-saleemul-huq-media/bangladeshs-climate-diplomacy/"
            },
            {
                title: "Bangladesh-EU relations pass a new milestone with the initialling of a Partnership and Cooperation Agreement",
                source: "European Union in Bangladesh",
                summary: "An official EU update on the new Bangladesh-EU partnership framework covering trade, security, climate, and maritime cooperation.",
                url: "https://www.facebook.com/EUinBangladesh/posts/bangladesh-eu-relations-pass-a-new-milestone-with-the-initialling-of-the-partner/1390332879787647/"
            },
            {
                title: "Bangladesh, EU strike deal on trade, investment, sustainable development",
                source: "Just Style",
                summary: "A trade-focused report on the Bangladesh-EU partnership and its implications for apparel exports and broader cooperation.",
                url: "https://www.just-style.com/news/bangladesh-eu-strike-deal-on-trade-investment-sustainable-development/"
            },
            {
                title: "Energy crisis poses difficult policy trade-off challenges: GED",
                source: "The Business Standard",
                summary: "A report on Bangladesh’s energy crisis and how global energy prices are affecting inflation, imports, and fiscal balance.",
                url: "https://www.tbsnews.net/bangladesh/energy/energy-crisis-poses-difficult-policy-trade-challenges-ged-1406836"
            },
            {
                title: "How shockwaves from the Gulf are reshaping Bangladesh's economy",
                source: "International Growth Centre",
                summary: "An analysis of how Middle East supply shocks affect Bangladesh’s energy dependence, remittances, trade, and inflation.",
                url: "https://www.theigc.org/blogs/energy-crisis-bangladesh-economy"
            },
            {
                title: "Bangladesh’s Shifting Geopolitics: Why India Cannot Afford To Wait",
                source: "Asia Society Policy Institute",
                summary: "An analysis of Bangladesh’s shifting posture after the 2024 political transition and its implications for India, China, and Pakistan.",
                url: "https://asiasociety.org/policy-institute/bangladeshs-shifting-geopolitics-why-india-cannot-afford-wait"
            },
            {
                title: "Indo-Pacific: Bangladesh's Strategic Move to Geopolitics, Climate Diplomacy, and Security",
                source: "Dirosat Journal Article",
                summary: "A scholarly article on Bangladesh’s Indo-Pacific engagement, climate diplomacy, migration pressures, and Bay of Bengal security.",
                url: "https://dirosat.com/index.php/i/article/view/128"
            }
        ];

        function loadRandomArticle() {
            const randomIndex = Math.floor(Math.random() * articles.length);
            const chosen = articles[randomIndex];
            const cardHTML = `
                <div class="intel-card">
                    <div class="classified-stamp">CLASSIFIED</div>
                    <span class="intel-source">Source: ${chosen.source}</span>
                    <h2 class="intel-title">${chosen.title}</h2>
                    <p class="intel-summary">${chosen.summary}</p>
                    <a href="${chosen.url}" target="_blank" class="read-btn">Read Full Briefing →</a>
                </div>
            `;
            document.getElementById('card-container').innerHTML = cardHTML;
        }
    </script>

</body>
</html>
