    <!-- ABOUT SECTION (Frosted Glass) -->
    <section id="about" class="section about-grid">
        <div class="about-text" data-aos="fade-right">
            <h2 class="section-title">OUR VISION</h2>
            <p>To develop students' awareness of historical and contemporary geopolitical developments around the world. We offer a structured academic environment where members build research, writing, debate, and negotiation skills, thereby shaping them into knowledgeable, diplomatic, and globally conscious citizens.</p>
        </div>
        <div class="about-image" data-aos="fade-left">
            <img src="https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?auto=format&fit=crop&w=800&q=80" alt="UN General Assembly Hall">
        </div>
    </section>

                    <div class="timeline-image"><img src="https://images.unsplash.com/photo-1488375634201-b85b28653a79?q=80&w=1429&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="World Map"></div>

                        <li>What is International Relations and Why It Matters</li>
                        <li>Foundations of International Relations</li>
                        <li>Understanding World Politics</li>
                    </ul>
                </div>
            </div>
            
            <div class="timeline-item" data-aos="fade-right">

                    <ul>
                        <li>Current Geopolitical Issues in South Asia</li>
                        <li>Diplomacy & Negotiation</li>
                        <li>Introduction to Model United Nations</li>
                    </ul>
                </div>
            </div>

            <div class="timeline-item" data-aos="fade-left">
